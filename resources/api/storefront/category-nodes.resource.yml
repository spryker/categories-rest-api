resource:
    name: CategoryNodes
    shortName: category-nodes
    description: 'Storefront category nodes'

    provider: Spryker\Glue\CategoriesRestApi\Api\Storefront\Provider\CategoryNodesStorefrontProvider

    paginationEnabled: false

    operations:
        - type: Get
          description: 'Retrieve a specific category node by ID'
        - type: GetCollection
          description: 'Not supported — returns 400 when no category node ID is specified'

    includableIn:
        - resource: Navigations
          relationshipName: category-nodes
        - resource: AbstractProducts
          relationshipName: category-nodes

    properties:
        categoryNodeId:
            type: string
            identifier: true
            writable: false
            readable: false
            required: false
            description: 'Category node identifier for routing'
            openapiContext:
                example: '5'

        nodeId:
            type: integer
            writable: false
            readable: true
            required: false
            description: 'Category node identifier'
            openapiContext:
                example: '5'

        name:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Category name'
            openapiContext:
                example: 'Computers'

        metaTitle:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Meta title for SEO'
            openapiContext:
                example: 'Computers'

        metaKeywords:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Meta keywords for SEO'
            openapiContext:
                example: 'computers, laptops, desktops'

        metaDescription:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Meta description for SEO'
            openapiContext:
                example: 'Explore our range of computers'

        isActive:
            type: boolean
            writable: false
            readable: true
            required: false
            description: 'Whether the category is active'
            openapiContext:
                example: true

        order:
            type: integer
            writable: false
            readable: true
            required: false
            description: 'Sort order position'
            openapiContext:
                example: 100

        url:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Category URL'
            openapiContext:
                example: '/en/computers'

        children:
            type: array
            writable: false
            readable: true
            required: false
            description: 'Child category nodes'
            openapiContext:
                example:
                    - nodeId: '6'
                      name: 'Digital Cameras'
                      metaTitle: 'Digital Cameras'
                      metaKeywords: 'digital cameras'
                      metaDescription: 'Best digital cameras.'
                      isActive: true
                      order: 10
                      url: '/en/cameras-camcorders/digital-cameras'
                      children: []
                      parents: []

        parents:
            type: array
            writable: false
            readable: true
            required: false
            description: 'Parent category nodes'
            openapiContext:
                example:
                    - nodeId: '1'
                      name: 'Electronics'
                      metaTitle: 'Electronics'
                      metaKeywords: 'electronics'
                      metaDescription: 'Electronics catalog.'
                      isActive: true
                      order: 1
                      url: '/en/electronics'
                      children: []
                      parents: []
